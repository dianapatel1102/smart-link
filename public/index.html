<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Link Shortener</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}
        body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}
        .container{max-width:550px;margin:0 auto}
        .card{background:white;border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.3);margin-bottom:20px}
        h1{text-align:center;color:#333;font-size:1.3em;margin-bottom:5px}
        h2{color:#333;font-size:1.1em;margin-bottom:15px}
        .subtitle{text-align:center;color:#666;margin-bottom:20px;font-size:13px}
        .input-group{margin-bottom:12px}
        label{display:block;margin-bottom:5px;font-weight:bold;font-size:13px;color:#555}
        input{width:100%;padding:12px;border:2px solid #e0e0e0;border-radius:10px;font-size:14px}
        button{width:100%;padding:14px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:16px;font-weight:bold;cursor:pointer;margin-top:8px}
        .result{background:#f0f8ff;border:2px solid #667eea;border-radius:15px;padding:20px;margin-top:20px;display:none}
        .result.show{display:block}
        .short-url{background:white;padding:12px;border-radius:8px;font-size:15px;color:#667eea;word-break:break-all;margin:10px 0;text-align:center;font-weight:bold}
        .copy-btn{background:#28a745;width:48%}
        .del-btn{background:#ff4757;width:48%}
        .btn-row{display:flex;gap:4%;margin-top:10px}
        .badge{display:inline-block;padding:4px 10px;border-radius:15px;font-size:10px;margin:2px}
        .badge.success{background:#d4edda;color:#155724}
        .badge.danger{background:#f8d7da;color:#721c24}
        .link-card{background:#f8f9fa;padding:12px;border-radius:10px;margin:8px 0;font-size:12px}
        .link-card .code{font-weight:bold;color:#667eea;font-size:14px}
        .link-card .stats{display:flex;gap:10px;margin-top:5px}
        .logout-btn{background:#666;margin-top:5px}
        .tab-btn{background:#f0f0f0;color:#333;margin-top:5px}
        .user-info{text-align:center;color:#28a745;font-size:12px;margin-bottom:10px}
    </style>
</head>
<body>
    <div class="container">
        
        <!-- LOGIN PAGE -->
        <div class="card" id="loginPage">
            <h1>🔐 Login</h1>
            <p class="subtitle">Smart Link Shortener</p>
            <div class="input-group"><label>Username:</label><input type="text" id="loginUser" placeholder="Enter username"></div>
            <div class="input-group"><label>Password:</label><input type="password" id="loginPass" placeholder="Enter password"></div>
            <button onclick="login()">🔓 Login</button>
            <button class="tab-btn" onclick="showRegister()">🆕 Register New Account</button>
            <p style="text-align:center;margin-top:10px;font-size:11px;color:#999">Default: admin / admin123</p>
        </div>
        
        <!-- REGISTER PAGE -->
        <div class="card" id="regPage" style="display:none">
            <h1>🆕 Register</h1>
            <div class="input-group"><label>Username (min 3):</label><input type="text" id="regUser" placeholder="Choose username"></div>
            <div class="input-group"><label>Password (min 4):</label><input type="password" id="regPass" placeholder="Choose password"></div>
            <button onclick="register()">✅ Register</button>
            <button class="tab-btn" onclick="showLogin()">🔙 Back to Login</button>
        </div>
        
        <!-- MAIN PAGE -->
        <div class="card" id="mainPage" style="display:none">
            <p class="user-info">👤 Logged in as: <b id="currentUser"></b></p>
            <h1>🎯 Short Link Banaye</h1>
            <div class="input-group"><label>💰 Offer Page URL:</label><input type="url" id="offerUrl" placeholder="https://your-offer-link.com"></div>
            <div class="input-group"><label>✏️ Custom Alias:</label><input type="text" id="alias" placeholder="Optional"></div>
            <div style="background:#f8f9fa;border-radius:12px;padding:12px;margin:12px 0;text-align:center;font-size:12px">👤 Human → Offer &nbsp;|&nbsp; 🤖 Bot → Safe Page</div>
            <button onclick="createLink()">🚀 Short Link Banaye</button>
            <div class="result" id="result">
                <h3 style="color:#28a745;font-size:14px">✅ Link Ready!</h3>
                <div class="short-url" id="shortUrl"></div>
                <span class="badge success">👤 Offer</span><span class="badge danger">🤖 Safe</span>
                <div class="btn-row"><button class="copy-btn" onclick="copyLink()">📋 Copy</button><button class="del-btn" onclick="deleteLink()">🗑️ Delete</button></div>
            </div>
            <button class="tab-btn" onclick="loadMyLinks()">📊 My Links & Stats</button>
            <button class="logout-btn" onclick="logout()">🚪 Logout</button>
        </div>
        
        <!-- MY LINKS PAGE -->
        <div class="card" id="linksPage" style="display:none">
            <h2>📊 My Links</h2>
            <div id="linksList"></div>
            <button class="tab-btn" onclick="showMain()">🔙 Back</button>
        </div>
        
    </div>

    <script>
        let token = localStorage.getItem('token');
        let currentCode = '';
        let currentUser = localStorage.getItem('user') || '';
        
        if (token) { showMain(); document.getElementById('currentUser').textContent = currentUser; }
        
        function showRegister() { document.getElementById('loginPage').style.display='none'; document.getElementById('regPage').style.display='block'; }
        function showLogin() { document.getElementById('regPage').style.display='none'; document.getElementById('loginPage').style.display='block'; }
        function showMain() { hideAll(); document.getElementById('mainPage').style.display='block'; document.getElementById('currentUser').textContent=currentUser; }
        function showLinks() { hideAll(); document.getElementById('linksPage').style.display='block'; loadMyLinks(); }
        function hideAll() { ['loginPage','regPage','mainPage','linksPage'].forEach(id=>document.getElementById(id).style.display='none'); }
        
        async function register() {
            const u=document.getElementById('regUser').value,p=document.getElementById('regPass').value;
            const r=await fetch('/api/register',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            const d=await r.json();
            if(d.error) return alert(d.error);
            token=d.token; currentUser=d.username;
            localStorage.setItem('token',token); localStorage.setItem('user',currentUser);
            showMain();
        }
        
        async function login() {
            const u=document.getElementById('loginUser').value,p=document.getElementById('loginPass').value;
            const r=await fetch('/api/login',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({username:u,password:p})});
            const d=await r.json();
            if(d.error) return alert(d.error);
            token=d.token; currentUser=d.username;
            localStorage.setItem('token',token); localStorage.setItem('user',currentUser);
            showMain();
        }
        
        function logout() { localStorage.clear(); token=''; hideAll(); document.getElementById('loginPage').style.display='block'; }
        
        async function createLink() {
            const u=document.getElementById('offerUrl').value,a=document.getElementById('alias').value;
            if(!u.startsWith('http')) return alert('Valid URL dalo');
            const r=await fetch('/api/create',{method:'POST',headers:{'Content-Type':'application/json','Authorization':token},body:JSON.stringify({offerPage:u,alias:a||undefined})});
            const d=await r.json();
            if(d.error) return alert(d.error);
            currentCode=d.code;
            document.getElementById('shortUrl').textContent=d.shortUrl;
            document.getElementById('result').classList.add('show');
        }
        
        function copyLink(){navigator.clipboard.writeText(document.getElementById('shortUrl').textContent);alert('📋 Copied!')}
        
        async function deleteLink(){
            if(!currentCode) return;
            if(!confirm('Delete this link?')) return;
            await fetch('/api/delete/'+currentCode,{method:'DELETE',headers:{'Authorization':token}});
            document.getElementById('result').classList.remove('show');
            alert('Deleted!');
        }
        
        async function loadMyLinks() {
            showLinks();
            const r=await fetch('/api/mylinks',{headers:{'Authorization':token}});
            const d=await r.json();
            let html='';
            d.links.forEach(l=>{
                html+=`<div class="link-card"><div class="code">/${l.code}</div><small>Offer: ${l.offerPage.substring(0,40)}...</small><div class="stats"><span>👤 ${l.humanClicks}</span><span>🤖 ${l.botClicks}</span><span>📊 ${l.totalClicks}</span></div></div>`;
            });
            document.getElementById('linksList').innerHTML=html||'<p style="font-size:12px;color:#999">No links yet</p>';
        }
    </script>
</body>
</html>
