<!DOCTYPE html>
<html lang="hi">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>Smart Link Shortener</title>
    <style>
        *{margin:0;padding:0;box-sizing:border-box}body{font-family:Arial;background:linear-gradient(135deg,#667eea,#764ba2);min-height:100vh;padding:20px}.container{max-width:500px;margin:0 auto}.card{background:white;border-radius:20px;padding:25px;box-shadow:0 10px 40px rgba(0,0,0,0.3)}h1{text-align:center;color:#333;font-size:1.5em}.subtitle{text-align:center;color:#666;margin-bottom:20px;font-size:14px}.input-group{margin-bottom:15px}label{display:block;margin-bottom:5px;font-weight:bold;font-size:14px;color:#555}input{width:100%;padding:14px;border:2px solid #e0e0e0;border-radius:10px;font-size:15px}button{width:100%;padding:15px;background:linear-gradient(135deg,#667eea,#764ba2);color:white;border:none;border-radius:12px;font-size:17px;font-weight:bold;cursor:pointer;margin-top:10px}.result{background:#f0f8ff;border:2px solid #667eea;border-radius:15px;padding:20px;margin-top:20px;display:none}.result.show{display:block}.short-url{background:white;padding:15px;border-radius:8px;font-size:16px;color:#667eea;word-break:break-all;margin:15px 0;text-align:center;font-weight:bold}.copy-btn{background:#28a745}.badge{display:inline-block;padding:5px 12px;border-radius:15px;font-size:11px;margin:3px}.badge.success{background:#d4edda;color:#155724}.badge.danger{background:#f8d7da;color:#721c24}.flow-box{background:#f8f9fa;border-radius:15px;padding:15px;margin:15px 0;text-align:center;font-size:13px}
    </style>
</head>
<body>
    <div class="container">
        <div class="card">
            <h1>🎯 Smart Link Shortener</h1>
            <p class="subtitle">👤 Human → Offer Page | 🤖 Bot → Safe Page</p>
            <div class="input-group">
                <label>💰 Apni Offer Page URL:</label>
                <input type="url" id="offerUrl" placeholder="https://your-offer-link.com">
            </div>
            <div class="input-group">
                <label>✏️ Custom Alias (Optional):</label>
                <input type="text" id="alias" placeholder="my-link">
            </div>
            <div class="flow-box">👤 <b>Human</b> → Offer Page &nbsp;|&nbsp; 🤖 <b>Bot</b> → Safe Page</div>
            <button onclick="createLink()">🚀 Short Link Banaye</button>
            <div class="result" id="result">
                <h3 style="color:#28a745">✅ Link Ready!</h3>
                <div class="short-url" id="shortUrl"></div>
                <span class="badge success">👤 Human = Offer</span>
                <span class="badge danger">🤖 Bot = Safe</span>
                <button class="copy-btn" onclick="copyLink()">📋 Copy Link</button>
            </div>
        </div>
    </div>
    <script>
        async function createLink(){
            const u=document.getElementById('offerUrl').value,a=document.getElementById('alias').value;
            if(!u.startsWith('http'))return alert('Valid URL dalo');
            const b=document.querySelector('button');b.textContent='Creating...';b.disabled=true;
            try{
                const r=await fetch('/api/create',{method:'POST',headers:{'Content-Type':'application/json'},body:JSON.stringify({offerPage:u,alias:a||undefined})});
                const d=await r.json();
                if(d.error){alert(d.error);b.textContent='🚀 Short Link Banaye';b.disabled=false;return}
                document.getElementById('shortUrl').textContent=d.shortUrl;
                document.getElementById('result').classList.add('show');
                b.textContent='✅ Created!';b.disabled=false;
            }catch(e){alert('Error: '+e.message);b.textContent='🚀 Short Link Banaye';b.disabled=false}
        }
        function copyLink(){navigator.clipboard.writeText(document.getElementById('shortUrl').textContent);alert('📋 Copied!')}
    </script>
</body>
</html>
